name: Update enforcement countdown

# Keeps the date-relative EU AI Act countdown in README.md current without a
# human editing it. Runs weekly (and on demand) and commits only when the day
# counts actually change.
on:
  schedule:
    - cron: "17 6 * * 1"   # Mondays 06:17 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Refresh README countdown
        run: python scripts/update_readme_countdown.py
      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain README.md)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "chore(readme): refresh enforcement countdown [skip ci]"
            git push
          else
            echo "Countdown already current."
          fi
